<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <div class="header">
        <span class="header-emoji">🐾</span>
        <h1>Petmon</h1>
      </div>

      <div class="row toggle-row">
        <span>Show pet on pages</span>
        <label class="switch">
          <input type="checkbox" id="enabled-toggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="row toggle-row">
        <span>Only play sound on pet click</span>
        <label class="switch">
          <input type="checkbox" id="pet-only-toggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div style="margin-top: 20px !important" />

      <div class="slider-row">
        <div class="slider-row-label">
          <span>Size</span>
          <span id="size-value">1.0x</span>
        </div>
        <input
          type="range"
          id="size-slider"
          min="0.5"
          max="2.5"
          step="0.1"
          value="1" />
      </div>

      <div class="slider-row">
        <div class="slider-row-label">
          <span>Height from bottom</span>
          <span id="lift-value">0px</span>
        </div>
        <input
          type="range"
          id="lift-slider"
          min="0"
          max="150"
          step="5"
          value="0" />
      </div>

      <div class="row">
        <span class="section-label">Your pets</span>
      </div>

      <div class="pet-grid" id="pet-grid"></div>

      <button class="add-pet-btn" id="toggle-add-form">+ Add custom pet</button>

      <p class="hint">Click your pet on any page to hear it react.</p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
