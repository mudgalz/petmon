<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Petmon: Add custom pet</title>
    <link rel="stylesheet" href="add-pet.css" />
  </head>
  <body>
    <div class="page">
      <div class="header">
        <h1>Petmon: Add custom pet</h1>
      </div>

      <label class="field-label">Name</label>
      <input
        type="text"
        id="new-pet-name"
        placeholder="e.g. Biscuit"
        maxlength="20" />

      <label class="field-label">Character</label>
      <div class="template-grid" id="template-grid">
        <button class="template-option" data-template="cat">
          <div class="template-preview" data-preview="cat"></div>
          <span>Cat</span>
        </button>
        <button class="template-option" data-template="dog">
          <div class="template-preview" data-preview="dog"></div>
          <span>Dog</span>
        </button>
        <button class="template-option" data-template="ducky">
          <div class="template-preview" data-preview="ducky"></div>
          <span>Ducky</span>
        </button>
        <button class="template-option" data-template="monster">
          <div class="template-preview" data-preview="monster"></div>
          <span>Monster</span>
        </button>
        <button class="template-option" data-template="punk">
          <div class="template-preview" data-preview="punk"></div>
          <span>Punk</span>
        </button>
        <button class="template-option" data-template="tard">
          <div class="template-preview" data-preview="tard"></div>
          <span>Tard</span>
        </button>
        <button class="template-option" data-template="finn">
          <div class="template-preview" data-preview="finn"></div>
          <span>Finn</span>
        </button>
        <button class="template-option" data-template="gorgon">
          <div class="template-preview" data-preview="gorgon"></div>
          <span>Gorgon</span>
        </button>
      </div>

      <label class="field-label">Color shift</label>
      <input type="range" id="color-slider" min="0" max="360" value="0" />

      <label class="field-label">Sound (audio file)</label>
      <input type="file" id="sound-file" accept="audio/*" />
      <span class="file-hint" id="sound-file-name">No file chosen</span>

      <div class="form-buttons">
        <button class="save-btn" id="save-pet-btn">Save pet</button>
        <button class="cancel-btn" id="cancel-btn">Cancel and close tab</button>
      </div>
      <p class="form-error" id="form-error"></p>
      <p class="success-msg" id="success-msg" hidden>
        ✅ Saved! You can close this tab and reopen the extension popup to see
        it.
      </p>
    </div>

    <script src="add-pet.js"></script>
  </body>
</html>
